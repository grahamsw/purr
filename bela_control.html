<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Synth (Bela Port)</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --surface: #1a1a1a;
            --accent: #00ffcc;
            --text: #e0e0e0;
            --text-dim: #888;
            --border: #333;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--surface);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 30px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        .control-group {
            margin-bottom: 25px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .val {
            color: var(--accent);
        }

        input[type=range] {
            width: 100%;
            background: transparent;
            -webkit-appearance: none;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            background: var(--border);
            height: 4px;
            border-radius: 2px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px rgba(0,255,204,0.4);
        }

        .power-btn {
            width: 100%;
            padding: 15px;
            background: none;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .power-btn:hover {
            background: rgba(0, 255, 204, 0.1);
        }

        .power-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        .status {
            font-size: 10px;
            text-align: center;
            margin-top: 20px;
            color: var(--text-dim);
        }

        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 5px;
        }

        .status-dot.online {
            background: var(--accent);
            box-shadow: 0 0 5px var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liquid Bela</h1>

        <div class="control-group">
            <label>Frequency <span class="val" id="freq-val">40.0 Hz</span></label>
            <input type="range" id="freq-slider" min="20" max="200" step="0.1" value="40">
        </div>

        <div class="control-group">
            <label>Viscosity <span class="val" id="visc-val">0.50</span></label>
            <input type="range" id="visc-slider" min="0" max="1" step="0.01" value="0.5">
        </div>

        <div class="control-group">
            <label>Volume <span class="val" id="vol-val">0.40</span></label>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.4">
        </div>

        <button id="power-btn" class="power-btn">Power Off</button>

        <div class="status">
            <span id="status-dot" class="status-dot"></span>
            SC Status: <span id="status-text">Offline</span>
        </div>
    </div>

    <script src="bela_control.js"></script>
</body>
</html>
